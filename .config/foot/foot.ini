[main]
term=foot
font=JetBrainsMono Nerd Font:size=12
font-bold=JetBrainsMono Nerd Font:weight=Bold:size=12
font-italic=JetBrainsMono Nerd Font:style=Italic:size=12
pad=12x10
initial-window-size-chars=100x30
initial-window-mode=windowed
app-id=foot

[scrollback]
lines=5000
multiplier=5.0

[url]
launch=xdg-open ${url}

[cursor]
[cursor]
style=block
blink=yes
blink-rate=500
[mouse]
hide-when-typing=yes

[colors-dark]
background=1a1512
foreground=e8d5c4
selection-background=3a2c22
selection-foreground=e8d5c4
regular0=1a1512
regular1=e85a4a
regular2=8ac44a
regular3=e8c24a
regular4=4a98e8
regular5=9a4ae8
regular6=4ae8c2
regular7=b89880
bright0=3a2c22
bright1=ff7060
bright2=a0d860
bright3=ffd860
bright4=60aeff
bright5=b060ff
bright6=60ffd8
bright7=e8d5c4

[key-bindings]
clipboard-copy=Control+c
clipboard-paste=Control+v
scrollback-up-page=Page_Up
scrollback-down-page=Page_Down
search-start=Control+Shift+f
font-increase=Control+plus
font-decrease=Control+minus
font-reset=Control+0
