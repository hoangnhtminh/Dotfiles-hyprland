[manager]
ratio          = [1, 3, 4]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
linemode       = "size"
show_hidden    = true
show_symlink   = true

[preview]
tab_size       = 2
max_width      = 600
max_height     = 900
cache_dir      = ""
image_filter   = "triangle"
image_quality  = 75
video_delay    = 0

[opener]
edit = [{ run = 'kitty -e nvim "$@"', desc = "nvim", block = true }]
open = [{ run = 'xdg-open "$@"', desc = "open" }]
reveal = [{ run = 'thunar "$(dirname "$1")"', desc = "thunar" }]

[open]
rules = [
    { mime = "text/*",       use = "edit" },
    { mime = "image/*",      use = "open" },
    { mime = "video/*",      use = "open" },
    { mime = "audio/*",      use = "open" },
    { mime = "application/pdf", use = "open" },
    { mime = "*",            use = "open" },
]
