input {
    kb_layout    = us
    kb_options   =
    follow_mouse = 1
    mouse_refocus = true
    float_switch_override_focus = 2

    sensitivity    = 0
    accel_profile  = flat
    force_no_accel = true

    touchpad {
        natural_scroll          = true
        disable_while_typing    = true
        scroll_factor           = 0.8
        tap-to-click            = true
        drag_lock               = true
        middle_button_emulation = false
    }
}

# Dùng left/right riêng biệt, KHÔNG dùng horizontal (nó shadow left/right)
gesture = 3, left,  workspace, e-1
gesture = 3, right, workspace, e+1
gesture = 3, up,    fullscreen
gesture = 3, down,  close

input {
    kb_options = altwin:super_win
}
