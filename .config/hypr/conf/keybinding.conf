SUPER = SUPER

# ── System ──────────────────────────────────────────────────
bind = SUPER,       Q,      killactive
bind = SUPER SHIFT, Q, exec, hyprctl activewindow | grep pid | tr -d 'pid:' | xargs kill
bind = SUPER,       F,      fullscreen
bind = SUPER SHIFT, F,      togglefloating
bind = SUPER,       P,      pseudo
bind = SUPER,       J,      togglesplit
bind = SUPER,       L,      exec, hyprlock
bind = SUPER,       Escape, exec, $wlogout

# ── Apps ────────────────────────────────────────────────────
bind = SUPER,       Return, exec, $terminal
bind = SUPER SHIFT, Return, exec, $terminal2
bind = SUPER,       E,      exec, $filemanager
bind = SUPER,       B,      exec, $browser
bind = SUPER,       T,      exec, $editor
bind = SUPER,       Space,  exec, $launcher
bind = SUPER SHIFT, R,      exec, $runner
bind = SUPER SHIFT, E,      exec, $emoji
bind = SUPER,       V,      exec, $clipboard
bind = SUPER SHIFT, S,      exec, $screenshot
bind = SUPER,       W,      exec, $wallpaper
bind = SUPER SHIFT, C,      exec, $colorpick
bind = SUPER,       C,      exec, $calc
bind = SUPER,       N,      exec, $swaync
bind = SUPER,       Y,      exec, ~/.config/scripts/sunset-toggle.sh toggle

# ── Focus ────────────────────────────────────────────────────
bind = SUPER, h,     movefocus, l
bind = SUPER, l,     movefocus, r
bind = SUPER, k,     movefocus, u
bind = SUPER, j,     movefocus, d
bind = SUPER, left,  movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up,    movefocus, u
bind = SUPER, down,  movefocus, d

# ── Move window ──────────────────────────────────────────────
bind = SUPER SHIFT, h,     movewindow, l
bind = SUPER SHIFT, l,     movewindow, r
bind = SUPER SHIFT, k,     movewindow, u
bind = SUPER SHIFT, j,     movewindow, d
bind = SUPER SHIFT, left,  movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up,    movewindow, u
bind = SUPER SHIFT, down,  movewindow, d

# ── Resize ──────────────────────────────────────────────────
binde = SUPER ALT, h,     resizeactive, -40 0
binde = SUPER ALT, l,     resizeactive,  40 0
binde = SUPER ALT, k,     resizeactive,  0 -40
binde = SUPER ALT, j,     resizeactive,  0  40
binde = SUPER ALT, left,  resizeactive, -40 0
binde = SUPER ALT, right, resizeactive,  40 0
binde = SUPER ALT, up,    resizeactive,  0 -40
binde = SUPER ALT, down,  resizeactive,  0  40

# ── Workspaces ───────────────────────────────────────────────
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

bind = SUPER,       Tab,       workspace, e+1
bind = SUPER SHIFT, Tab,       workspace, e-1
bind = SUPER,       mouse_down, workspace, e+1
bind = SUPER,       mouse_up,   workspace, e-1

# ── Special workspace ────────────────────────────────────────
bind = SUPER, S, togglespecialworkspace, scratch
bind = SUPER, M, togglespecialworkspace, music

# ── Mouse drag ──────────────────────────────────────────────
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# ── Audio ────────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl  = , XF86AudioPlay,        exec, playerctl play-pause
bindl  = , XF86AudioNext,        exec, playerctl next
bindl  = , XF86AudioPrev,        exec, playerctl previous

# ── Brightness ───────────────────────────────────────────────
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set +10%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# ── Screenshot ───────────────────────────────────────────────
bind = ,       Print,  exec, ~/.config/scripts/screenshot.sh full
bind = SHIFT,  Print,  exec, ~/.config/scripts/screenshot.sh area
bind = SUPER,   Print,  exec, ~/.config/scripts/screenshot.sh window

# ── Screen record ───────────────────────────────────────────
bind = SUPER, G,       exec, ~/.config/scripts/record.sh full
bind = SUPER SHIFT, G, exec, ~/.config/scripts/record.sh area
bind = SUPER SHIFT, B, exec, ~/.config/scripts/backup.sh
bind = SUPER, Z, exec, zathura
