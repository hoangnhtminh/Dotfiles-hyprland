# ── Opacity ──────────────────────────────────────────────────
windowrule = opacity 0.92 0.85, match:class ^(kitty|foot)$
windowrule = opacity 0.95 0.90, match:class ^(thunar|nemo)$
windowrule = opacity 0.97 0.93, match:class ^(code-oss|codium)$

# ── Float ────────────────────────────────────────────────────
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:class ^(org.gnome.Calculator|qalculate-gtk)$
windowrule = float on, match:class ^(eog|imv|feh)$
windowrule = float on, match:class ^(mpv)$
windowrule = float on, match:class ^(xdg-desktop-portal-gtk)$
windowrule = float on, match:class ^(rofi)$
windowrule = float on, match:class ^(wlogout)$
windowrule = float on, match:title ^(Open File)(.*)$
windowrule = float on, match:title ^(Save File)(.*)$
windowrule = float on, match:title ^(Open Folder)(.*)$
windowrule = float on, match:title ^(Picture-in-Picture)$

# ── Size & Center ────────────────────────────────────────────
windowrule = size 800 500, match:class ^(pavucontrol)$
windowrule = center on,    match:class ^(pavucontrol)$
windowrule = size 380 280, match:class ^(org.gnome.Calculator|qalculate-gtk)$
windowrule = center on,    match:class ^(org.gnome.Calculator|qalculate-gtk)$
windowrule = size 1100 700, match:title ^(Open File)(.*)$
windowrule = center on,     match:title ^(Open File)(.*)$

# ── PiP ──────────────────────────────────────────────────────
windowrule = pin on,                         match:title ^(Picture-in-Picture)$
windowrule = size 480 270,                   match:title ^(Picture-in-Picture)$
windowrule = move 100%-490 100%-280,         match:title ^(Picture-in-Picture)$

# ── Idle inhibit ─────────────────────────────────────────────
windowrule = idle_inhibit fullscreen, match:class ^(.*)$
windowrule = idle_inhibit focus,      match:class ^(mpv|vlc)$

# ── Stay focused ─────────────────────────────────────────────
windowrule = stay_focused on, match:class ^(rofi)$
windowrule = stay_focused on, match:class ^(wlogout)$

# ── Misc ─────────────────────────────────────────────────────
windowrule = no_focus on, match:class ^$

# ── Steam ────────────────────────────────────────────────────
windowrule = float on,   match:class ^(steam)$, match:title ^(Friends List)$
windowrule = no_blur on, match:class ^(steam)$, match:title ^(Steam)$

# ── XWayland video bridge ────────────────────────────────────
windowrule = opacity 0.0 override, match:class ^(xwaylandvideobridge)$
windowrule = no_anim on,           match:class ^(xwaylandvideobridge)$
windowrule = no_initial_focus on,  match:class ^(xwaylandvideobridge)$
windowrule = no_blur on,           match:class ^(xwaylandvideobridge)$

# ── Thunar blur & style ──────────────────────────────────────
windowrule = opacity 0.75 0.65, match:class ^(thunar)$

# ── Layerrules ───────────────────────────────────────────────
layerrule = blur on,       match:namespace waybar
layerrule = xray off,      match:namespace waybar
layerrule = ignore_alpha 0.0, match:namespace waybar
