##################################################
# AUTOSTART - conf/autostart.conf
##################################################

# Khởi động một lần (exec-once)
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Waybar
exec-once = waybar

# Notification daemon
exec-once = swaync

# Wallpaper (dùng swww - nhẹ nhất)
exec-once = swww-daemon
exec-once = sleep 0.5 && ~/.config/scripts/wallpaper.sh restore

# Input method - Unikey
exec-once = fcitx5 -d

# Clipboard manager
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Idle/Lock
exec-once = hypridle

# Tint màu ấm ban đêm (toggle bằng script)
# exec-once = wl-sunset -t 4500 -T 6500

# Xorg apps compatibility
exec-once = xrandr --output XWAYLAND0 --primary

# Cập nhật GTK theme
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'Adwaita-dark'
exec-once = gsettings set org.gnome.desktop.interface icon-theme 'Papirus-Dark'
exec-once = gsettings set org.gnome.desktop.interface cursor-theme 'Bibata-Modern-Ice'
exec-once = gsettings set org.gnome.desktop.interface cursor-size 24
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
