##################################################
# APPEARANCE - conf/appearance.conf
# Warm orange dark theme - nhẹ blur, border cam
##################################################

general {
    gaps_in  = 4
    gaps_out = 8
    border_size = 2

    col.active_border   = rgba(e8824aaa) rgba(c4683a88) 45deg
    col.inactive_border = rgba(241c1766)

    resize_on_border   = true
    extend_border_grab_area = 15
    hover_icon_on_border = true

    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 2

    active_opacity   = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0

    shadow {
        enabled      = true
        range        = 20
        render_power = 3
        color        = rgba(0a080499)
        color_inactive = rgba(0a080433)
        offset       = 2 4
        scale        = 1.0
    }

    blur {
        enabled       = true
        size          = 6
        passes        = 3
        noise         = 0.015
        contrast      = 0.9
        brightness    = 0.70
        vibrancy      = 0.15
        vibrancy_darkness = 0.0
        special       = true
        new_optimizations = true
        xray          = false
        ignore_opacity = true
    }

    dim_inactive  = true
    dim_strength  = 0.08
    dim_special   = 0.3
    dim_around    = 0.4
}
