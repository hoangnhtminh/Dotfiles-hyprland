##################################################
# ANIMATION - conf/animation.conf
# Nhanh, mượt, nhẹ - không quá flashy
##################################################

animations {
    enabled = true

    # Bezier curves tùy chỉnh
    bezier = easeOut,    0.0, 0.0, 0.2, 1.0
    bezier = easeIn,     0.4, 0.0, 1.0, 1.0
    bezier = easeInOut,  0.4, 0.0, 0.2, 1.0
    bezier = spring,     0.34, 1.56, 0.64, 1.0
    bezier = linear,     0.0,  0.0,  1.0,  1.0
    bezier = snap,       0.0,  0.9,  0.1,  1.0

    # Windows - nhanh gọn
    animation = windowsIn,   1, 3,  spring,  popin 80%
    animation = windowsOut,  1, 2,  easeIn,  popin 90%
    animation = windowsMove, 1, 3,  easeOut, slide

    # Border color transition
    animation = border,      1, 5,  linear
    animation = borderangle, 1, 30, linear, loop

    # Fade
    animation = fade,        1, 3,  easeOut
    animation = fadeIn,      1, 3,  easeOut
    animation = fadeOut,     1, 2,  easeIn
    animation = fadeDim,     1, 3,  easeOut
    animation = fadeShadow,  1, 3,  easeOut
    animation = fadeSwitch,  1, 3,  easeOut

    # Workspaces - slide ngang
    animation = workspaces,       1, 4, easeInOut, slide
    animation = specialWorkspace, 1, 4, easeInOut, slidevert

    # Layers (waybar, rofi, swaync)
    animation = layers,      1, 3, easeOut, slide
    animation = layersIn,    1, 3, spring,  fade
    animation = layersOut,   1, 2, easeIn,  fade
}
